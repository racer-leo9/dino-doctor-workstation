<!DOCTYPE html>
<html lang="zh-CN">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>拆解库</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap');
:root{--bg:#000;--card:rgba(28,28,30,.85);--card2:rgba(44,44,46,.65);--text:#f5f5f7;--sub:#98989d;--blue:#0a84ff;--green:#30d158;--orange:#ff9f0a;--red:#ff453a;--border:rgba(255,255,255,.08);--radius:20px}
*{margin:0;padding:0;box-sizing:border-box}
body{font-family:'Inter','SF Pro Display','PingFang SC','Microsoft YaHei',sans-serif;background:var(--bg);color:var(--text);min-height:100vh;-webkit-font-smoothing:antialiased}
.topbar{position:sticky;top:0;z-index:100;background:rgba(0,0,0,.75);backdrop-filter:saturate(180%) blur(20px);border-bottom:1px solid var(--border);padding:14px 28px;display:flex;align-items:center;gap:16px}
.topbar h1{font-size:18px;font-weight:600;flex:1;background:linear-gradient(135deg,#fff,#a0a0a5);-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.topbar .logo{font-size:22px}
.nav-btn{padding:8px 22px;background:var(--card2);color:var(--text);border:1px solid var(--border);border-radius:980px;font-size:13px;font-weight:600;cursor:pointer;transition:all .25s;font-family:inherit;text-decoration:none;display:inline-block}
.nav-btn:hover{background:var(--blue);color:#fff;border-color:var(--blue)}
.container{max-width:1400px;margin:0 auto;padding:28px}
.stats{display:flex;gap:16px;margin-bottom:28px;flex-wrap:wrap}
.stat-card{background:var(--card);border:1px solid var(--border);border-radius:16px;padding:20px 24px;flex:1;min-width:160px;backdrop-filter:blur(20px)}
.stat-num{font-size:32px;font-weight:700;background:linear-gradient(135deg,var(--blue),var(--green));-webkit-background-clip:text;-webkit-text-fill-color:transparent}
.stat-label{font-size:12px;color:var(--sub);margin-top:4px;font-weight:500}
.filters{display:flex;gap:10px;margin-bottom:20px;flex-wrap:wrap}
.filter-btn{padding:6px 16px;border-radius:980px;border:1px solid var(--border);background:transparent;color:var(--sub);font-size:12px;font-weight:500;cursor:pointer;transition:all .2s;font-family:inherit}
.filter-btn.active{background:var(--blue);color:#fff;border-color:var(--blue)}
.grid{display:grid;grid-template-columns:repeat(auto-fill,minmax(320px,1fr));gap:16px}
.task-card{background:var(--card);border:1px solid var(--border);border-radius:18px;overflow:hidden;cursor:pointer;transition:all .3s;backdrop-filter:blur(20px);animation:fadeIn .4s ease both}
.task-card:hover{transform:translateY(-4px);box-shadow:0 12px 40px rgba(0,0,0,.5);border-color:rgba(255,255,255,.15)}
.task-card-body{padding:20px}
.task-card-title{font-size:15px;font-weight:600;margin-bottom:10px;line-height:1.4;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.task-card-meta{display:flex;gap:8px;flex-wrap:wrap;margin-bottom:12px}
.task-tag{font-size:11px;padding:3px 10px;border-radius:980px;font-weight:500}
.tag-score{background:rgba(48,209,88,.12);color:var(--green)}
.task-card-preview{font-size:12px;color:var(--sub);line-height:1.6;max-height:60px;overflow:hidden;display:-webkit-box;-webkit-line-clamp:3;-webkit-box-orient:vertical}
.task-card-footer{padding:12px 20px;border-top:1px solid var(--border);display:flex;align-items:center;justify-content:space-between}
.task-card-footer .source{font-size:11px;color:var(--sub)}
.task-card-footer .arrow{color:var(--sub);font-size:14px}
.empty{text-align:center;padding:120px 20px;color:var(--sub)}
.empty .icon{font-size:64px;margin-bottom:20px;opacity:.5}
.empty p{font-size:16px}
.loading{text-align:center;padding:60px;color:var(--sub)}
@keyframes fadeIn{from{opacity:0;transform:translateY(12px)}to{opacity:1;transform:translateY(0)}}
::-webkit-scrollbar{width:6px}::-webkit-scrollbar-track{background:transparent}::-webkit-scrollbar-thumb{background:rgba(255,255,255,.15);border-radius:3px}
</style>
</head>
<body>
<div class="topbar">
  <span class="logo">📚</span>
  <h1>拆解库</h1>
  <a href="/" class="nav-btn">🔧 工作台</a>
</div>
<div class="container">
  <div class="stats" id="stats"></div>
  <div class="filters" id="filters">
    <button class="filter-btn active" onclick="filterTasks('all',this)">全部</button>
    <button class="filter-btn" onclick="filterTasks('local',this)">本地分析</button>
    <button class="filter-btn" onclick="filterTasks('feishu',this)">飞书同步</button>
    <button class="filter-btn" onclick="filterTasks('high',this)">高分 (≥8)</button>
  </div>
  <div id="taskGrid" class="grid"><div class="loading">加载中...</div></div>
</div>
<script>
let allTasks=[];
let currentFilter='all';

fetch('/api/tasks').then(r=>r.json()).then(tasks=>{
  allTasks=tasks||[];
  renderStats();
  renderGrid();
}).catch(()=>{
  document.getElementById('taskGrid').innerHTML='<div class="empty"><div class="icon">📭</div><p>暂无数据</p></div>';
});

function renderStats(){
  const total=allTasks.length;
  const scores=allTasks.filter(t=>t.content_score).map(t=>Number(t.content_score)||0);
  const avg=scores.length?(scores.reduce((a,b)=>a+b,0)/scores.length).toFixed(1):'-';
  const high=allTasks.filter(t=>(Number(t.content_score)||0)>=8).length;
  const feishu=allTasks.filter(t=>t.source==='feishu').length;
  document.getElementById('stats').innerHTML=
    '<div class="stat-card"><div class="stat-num">'+total+'</div><div class="stat-label">总拆解数</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+avg+'</div><div class="stat-label">平均评分</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+high+'</div><div class="stat-label">高分作品</div></div>'+
    '<div class="stat-card"><div class="stat-num">'+feishu+'</div><div class="stat-label">飞书同步</div></div>';
}

function filterTasks(f,btn){
  currentFilter=f;
  document.querySelectorAll('.filter-btn').forEach(b=>b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}

function renderGrid(){
  let list=allTasks;
  if(currentFilter==='local') list=list.filter(t=>t.source!=='feishu');
  else if(currentFilter==='feishu') list=list.filter(t=>t.source==='feishu');
  else if(currentFilter==='high') list=list.filter(t=>(Number(t.content_score)||0)>=8);
  if(!list.length){
    document.getElementById('taskGrid').innerHTML='<div class="empty"><div class="icon">📭</div><p>暂无记录</p></div>';
    return;
  }
  document.getElementById('taskGrid').innerHTML=list.map(t=>{
    const score=t.content_score?Number(t.content_score):0;
    const title=esc(t.title||t.url||'未知');
    const preview=esc(t.url||'');
    const sid=esc(String(t.id));
    const src=esc(t.source||'local');
    return '<div class="task-card" onclick="openTask(\''+sid+'\',\''+src+'\')">'+
      '<div class="task-card-body">'+
        '<div class="task-card-title">'+title+'</div>'+
        '<div class="task-card-meta">'+(score?'<span class="task-tag tag-score">评分 '+score+'/10</span>':'')+'</div>'+
        '<div class="task-card-preview">'+preview+'</div>'+
      '</div>'+
      '<div class="task-card-footer"><span class="source">'+src+'</span><span class="arrow">→</span></div>'+
    '</div>';
  }).join('');
}

function openTask(id,source){
  if(source==='feishu') window.open('/?feishu='+id,'_blank');
  else window.open('/?task='+id,'_blank');
}

function esc(s){if(!s)return'';const d=document.createElement('div');d.textContent=s;return d.innerHTML;}
</script>
</body>
</html>
